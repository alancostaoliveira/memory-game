<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo da Memória</title>
    <!-- Importação dos estilos -->
    <link rel="stylesheet" href="src/styles/reset.css" />
    <link rel="stylesheet" href="src/styles/main.css" />
  </head>
  <body>
    <div class="container">
      <h2>Jogo da Memória</h2>
      <!-- Container principal onde as cartas serão geradas dinamicamente -->
      <div class="game"></div>
      <!-- Botão de reset para reiniciar a partida -->
      <button class="reset" onclick="window.location.reload()">
        RESET GAME
      </button>
    </div>

    <!-- Importação da lógica do jogo -->
    <script src="src/scripts/engine.js" defer></script>
  </body>
</html>
